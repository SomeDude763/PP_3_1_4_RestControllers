<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Страница пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <b th:text="${user.username}"></b>
            с ролью:
            <span th:each="role : ${user.roles}" th:text="${role.role} + ' '"></span>
        </span>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light">Выйти</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 bg-light vh-100">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/user">User</a>
                </li>
            </ul>
        </div>

        <div class="col-10">
            <h2 class="mt-3">Информация о пользователе</h2>

            <table class="table table-striped mt-3">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Роли</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td>
                        <span th:each="role : ${user.roles}" th:text="${role.role} + ' '"></span>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
