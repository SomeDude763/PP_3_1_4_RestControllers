<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Страница админа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <b th:text="${currentUser.username}"></b>
            с ролью:
            <span th:each="role : ${currentUser.roles}"
                  th:text="${role.role} + ' '"></span>
        </span>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light">Выйти</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- левая панель -->
        <div class="col-2 bg-light vh-100">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/admin">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user">User</a>
                </li>
            </ul>
        </div>

        <div class="col-10">

            <h2 class="mt-3">Панель админа</h2>

            <!-- Таблицы -->
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#users">
                        Таблица пользователей
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUser">
                        Новый пользователь
                    </button>
                </li>
            </ul>

            <div class="tab-content mt-3">

                <!-- Таблица пользователей -->
                <div class="tab-pane fade show active" id="users">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Роли</th>
                            <th>Действия</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="user : ${findAll}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.role} + ' '"></span>
                            </td>

                            <td>
                                <!-- Редактирование -->
                                <button class="btn btn-sm btn-info"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#editModal' + ${user.id}">
                                    Редактировать
                                </button>

                                <!-- Удаление -->
                                <form th:action="@{/admin/delete}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${user.id}">
                                    <button class="btn btn-sm btn-danger">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>

                <!-- Новый пользователь -->
                <div class="tab-pane fade" id="newUser">

                    <form th:action="@{/admin/new}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" th:field="*{username}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" th:field="*{password}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roles</label>

                            <div th:each="role : ${roleList}">
                                <input type="checkbox" name="roles"
                                       th:value="${role.role}">
                                <span th:text="${role.role}"></span>
                            </div>
                        </div>

                        <button class="btn btn-success">Создать</button>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>

<!--  редактирование-->
<div th:each="user : ${findAll}">
    <div class="modal fade" th:id="'editModal' + ${user.id}">
        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/admin/edit}" method="post">

                    <div class="modal-header">
                        <h5>Редактировать пользователя</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" name="id" th:value="${user.id}">

                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" name="username"
                                   class="form-control"
                                   th:value="${user.username}">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="text" name="password" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Роли</label>

                            <div th:each="role : ${roleList}">
                                <input type="checkbox" name="roles"
                                       th:value="${role.role}"
                                       th:checked="${user.roles.contains(role)}">
                                <span th:text="${role.role}"></span>
                            </div>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                        <button class="btn btn-primary">Сохранить</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
