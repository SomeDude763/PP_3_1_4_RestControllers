<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
</head>
<body>
<h2>Страница Админа</h2>

<form th:action="@{/logout}" method="post">
    <button type="submit">Выйти</button>
</form>

<p><a th:href="@{/admin/new}">Создать нового пользователя</a></p>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${findAll}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.role} + ' '"></span>
        </td>
        <td>
            <form th:action="@{/admin/edit}" method="get" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}" />
                <button type="submit">Редактировать</button>
            </form>

            <form th:action="@{/admin/delete}" method="post" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}" />
                <button type="submit">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
