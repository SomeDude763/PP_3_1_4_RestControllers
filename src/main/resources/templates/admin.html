<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Страница админа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <b id="navbarUsername"></b>
            с ролью:
            <span id="navbarRoles"></span>
        </span>

        <form action="/logout" method="post">
            <button type="submit" class="btn btn-outline-light">Выйти</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- левая панель -->
        <div class="col-2 bg-light vh-100">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/admin">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user">User</a>
                </li>
            </ul>
        </div>

        <div class="col-10">

            <h2 class="mt-3">Панель админа</h2>

            <!-- Таблицы -->
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#users">
                        Таблица пользователей
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUser">
                        Новый пользователь
                    </button>
                </li>
            </ul>

            <div class="tab-content mt-3">

                <!-- Таблица пользователей -->
                <div class="tab-pane fade show active" id="users">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Роли</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>

                </div>

                <!-- Новый пользователь -->
                <div class="tab-pane fade" id="newUser">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="newUserName">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="newPassword">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div id="roles">
                            </div>
                        </div>
                        <button class="btn btn-success" id="createButton">Создать</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="editModalsContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
